# =============================================================================
# Semper Lights — Nginx Configuration
# =============================================================================
# Acts as the main reverse proxy / entry point:
#   - Routes / to the frontend container (React SPA served by Nginx)
#   - Routes /api/* and /admin/* to the Django backend
#   - Routes /static/ and /media/ to the Django backend
# =============================================================================

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 20M;

    # -----------------------------------------------------------------------
    # Frontend — React SPA
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # -----------------------------------------------------------------------
    # API — proxy to Django backend
    # -----------------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # -----------------------------------------------------------------------
    # Admin — proxy to Django admin
    # -----------------------------------------------------------------------
    location /admin/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # -----------------------------------------------------------------------
    # Static files — served directly by Nginx for performance
    # -----------------------------------------------------------------------
    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------------------------
    # Media files — served directly by Nginx for performance
    # -----------------------------------------------------------------------
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # -----------------------------------------------------------------------
    # Security headers
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "same-origin" always;
}