# =============================================================================
# Semper Lights — Frontend Nginx Configuration
# =============================================================================
# Serves the compiled React SPA inside the frontend container.
# This is the internal Nginx, not the main reverse proxy.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache busting for fingerprinted assets
    location ~* \.(?:css|js|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "same-origin" always;
}