# =============================================================================
# Semper Lights — Frontend Nginx Configuration (Production)
# =============================================================================
# Serves the compiled React SPA inside the frontend container.
# This is the internal Nginx, not the main reverse proxy.
# =============================================================================

# ---------------------------------------------------------------------------
# Gzip compression for static assets
# ---------------------------------------------------------------------------
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/vnd.ms-fontobject
    application/x-font-ttf
    font/opentype
    image/svg+xml
    image/x-icon
    text/css
    text/javascript
    text/plain
    text/xml;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache busting for fingerprinted assets
    location ~* \.(?:css|js|svg|ico|png|jpg|jpeg|gif|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "same-origin" always;
}