# =============================================================================
# Semper Lights — Docker Build & Push to GHCR
# =============================================================================
# Builds and pushes container images to GitHub Container Registry (GHCR)
# on every push to the main branch.
#
# Images are tagged with both 'latest' and the commit SHA.
#
# This workflow does NOT deploy. It only produces images.
#
# Required permissions:
#   contents: read       — Checkout repository
#   packages: write      — Push to GHCR
# =============================================================================

name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------------
      # Step 1 — Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2 — Set up Docker Buildx
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Step 3 — Login to GitHub Container Registry
      # -----------------------------------------------------------------------
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Step 4 — Extract metadata for image tags
      # -----------------------------------------------------------------------
      - name: Extract Docker metadata
        id: meta
        env:
          GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}
        run: |
          echo "namespace=${GHCR_NAMESPACE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GHCR_NAMESPACE}/semperlights-frontend:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${GHCR_NAMESPACE}/semperlights-frontend:latest" >> "$GITHUB_OUTPUT"
          echo "sha_tag_backend=${GHCR_NAMESPACE}/semperlights-backend:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag_backend=${GHCR_NAMESPACE}/semperlights-backend:latest" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 5 — Build and push backend image
      # -----------------------------------------------------------------------
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/semperlights-backend:latest
            ghcr.io/${{ github.repository_owner }}/semperlights-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Step 6 — Build and push frontend image
      # -----------------------------------------------------------------------
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/semperlights-frontend:latest
            ghcr.io/${{ github.repository_owner }}/semperlights-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max